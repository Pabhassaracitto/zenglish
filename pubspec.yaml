name: zenglishapp
description: English for Wisdom & Meditation - App học tiếng Anh cho hệ thống Theravāda
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # ── Navigation ──
  go_router: ^13.2.0

  # ── Data / Serialization ──
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # ── Local Storage ──
  shared_preferences: ^2.2.2

  # ── UI / Fonts ──
  google_fonts: ^6.1.0

  # ── Utils ──
  uuid: ^4.3.3
  cloud_firestore: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
  fonts:
    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather-Regular.ttf
        - asset: assets/fonts/Merriweather-Bold.ttf
          weight: 700
